<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Pesquisas â Zukkin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
    color: white; padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header-logo span { color: #e94560; }
  .header-subtitle { font-size: 13px; opacity: 0.75; margin-top: 2px; }
  .header-badge { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 20px; font-size: 13px; }
  .header-date { font-size: 12px; opacity: 0.6; margin-top: 3px; text-align: right; }

  /* LAYOUT */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 24px 40px; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin: 28px 0 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .kpi-card {
    background: white; border-radius: 14px; padding: 20px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-top: 3px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 8px; }
  .kpi-value { font-size: 30px; font-weight: 800; line-height: 1; }
  .kpi-sub { font-size: 12px; color: #94a3b8; margin-top: 5px; }
  .kpi-blue { border-color: #3b82f6; } .kpi-blue .kpi-value { color: #1d4ed8; }
  .kpi-green { border-color: #22c55e; } .kpi-green .kpi-value { color: #16a34a; }
  .kpi-red { border-color: #ef4444; } .kpi-red .kpi-value { color: #dc2626; }
  .kpi-orange { border-color: #f97316; } .kpi-orange .kpi-value { color: #ea580c; }
  .kpi-purple { border-color: #a855f7; } .kpi-purple .kpi-value { color: #9333ea; }
  .kpi-yellow { border-color: #eab308; } .kpi-yellow .kpi-value { color: #ca8a04; }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-12 { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
  .grid-21 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

  /* CARDS */
  .card {
    background: white; border-radius: 14px; padding: 22px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .card-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .card-title .icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

  /* RESPONSÃVEL CARDS */
  .resp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .resp-card {
    background: white; border-radius: 14px; padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); border-left: 4px solid #3b82f6;
    position: relative; overflow: hidden;
  }
  .resp-card::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; border-radius: 50%; opacity: 0.06; transform: translate(20px, -20px); }
  .resp-card.verde { border-left-color: #22c55e; } .resp-card.verde::before { background: #22c55e; }
  .resp-card.amarelo { border-left-color: #eab308; } .resp-card.amarelo::before { background: #eab308; }
  .resp-card.vermelho { border-left-color: #ef4444; } .resp-card.vermelho::before { background: #ef4444; }
  .resp-card.azul { border-left-color: #3b82f6; } .resp-card.azul::before { background: #3b82f6; }

  .resp-name { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
  .resp-sub { font-size: 11px; color: #94a3b8; margin-bottom: 14px; }
  .resp-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .resp-metric { text-align: center; }
  .resp-metric-val { font-size: 20px; font-weight: 800; }
  .resp-metric-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3px; color: #94a3b8; margin-top: 1px; }
  .resp-metric.concluidas .resp-metric-val { color: #16a34a; }
  .resp-metric.atrasadas .resp-metric-val { color: #dc2626; }
  .resp-metric.aguardando .resp-metric-val { color: #d97706; }
  .resp-metric.reprovadas .resp-metric-val { color: #7c3aed; }

  /* PROGRESS BAR */
  .progress-wrap { margin-top: 6px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-bottom: 5px; }
  .progress-bar { height: 8px; background: #f1f5f9; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .fill-green { background: linear-gradient(90deg, #22c55e, #16a34a); }
  .fill-orange { background: linear-gradient(90deg, #f97316, #ea580c); }
  .fill-red { background: linear-gradient(90deg, #ef4444, #dc2626); }

  /* STATUS BADGE */
  .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-verde { background: #dcfce7; color: #15803d; }
  .badge-amarelo { background: #fef9c3; color: #854d0e; }
  .badge-vermelho { background: #fee2e2; color: #991b1b; }
  .badge-azul { background: #dbeafe; color: #1d4ed8; }
  .badge-roxo { background: #f3e8ff; color: #7c3aed; }

  /* TABLE */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
